apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aicodereviewer-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: aicodereviewer
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /api/metrics
      interval: 15s