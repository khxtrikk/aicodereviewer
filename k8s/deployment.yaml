apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicodereviewer
  labels:
    app: aicodereviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aicodereviewer
  template:
    metadata:
      labels:
        app: aicodereviewer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      containers:
        - name: aicodereviewer
          image: aicodereviewer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: aicodereviewer-secret
            - configMapRef:
                name: aicodereviewer-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          